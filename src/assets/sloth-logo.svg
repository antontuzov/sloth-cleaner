<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple sloth face -->
  <circle cx="50" cy="50" r="45" fill="#D97757"/>
  <circle cx="50" cy="50" r="38" fill="#E8976F"/>
  
  <!-- Eyes -->
  <circle cx="38" cy="45" r="6" fill="#1F2937"/>
  <circle cx="62" cy="45" r="6" fill="#1F2937"/>
  <circle cx="40" cy="43" r="2" fill="white"/>
  <circle cx="64" cy="43" r="2" fill="white"/>
  
  <!-- Eye patches -->
  <ellipse cx="38" cy="45" rx="10" ry="8" fill="#8B5A3A" opacity="0.4"/>
  <ellipse cx="62" cy="45" rx="10" ry="8" fill="#8B5A3A" opacity="0.4"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="5" ry="4" fill="#1F2937"/>
  
  <!-- Smile -->
  <path d="M 42 62 Q 50 68 58 62" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Claws on top -->
  <path d="M 30 20 L 35 10 L 40 20" fill="#8B5A3A"/>
  <path d="M 45 18 L 50 8 L 55 18" fill="#8B5A3A"/>
  <path d="M 60 20 L 65 10 L 70 20" fill="#8B5A3A"/>
</svg>
